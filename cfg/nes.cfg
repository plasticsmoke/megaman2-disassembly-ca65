# =============================================================================
# Mega Man 2 (U) — ld65 Linker Configuration
# Mapper 1 (MMC1): 256KB PRG, CHR-RAM
# Mode 3: $C000-$FFFF fixed (bank $0F), $8000-$BFFF switchable (banks $00-$0E)
# =============================================================================

MEMORY {
    # iNES header
    HDR:       start = $0000, size = $0010, fill = yes, file = %O;

    # 15 switchable 16KB PRG banks at $8000-$BFFF
    PRG00:     start = $8000, size = $4000, fill = yes, file = %O;
    PRG01:     start = $8000, size = $4000, fill = yes, file = %O;
    PRG02:     start = $8000, size = $4000, fill = yes, file = %O;
    PRG03:     start = $8000, size = $4000, fill = yes, file = %O;
    PRG04:     start = $8000, size = $4000, fill = yes, file = %O;
    PRG05:     start = $8000, size = $4000, fill = yes, file = %O;
    PRG06:     start = $8000, size = $4000, fill = yes, file = %O;
    PRG07:     start = $8000, size = $4000, fill = yes, file = %O;
    PRG08:     start = $8000, size = $4000, fill = yes, file = %O;
    PRG09:     start = $8000, size = $4000, fill = yes, file = %O;
    PRG0A:     start = $8000, size = $4000, fill = yes, file = %O;
    PRG0B:     start = $8000, size = $4000, fill = yes, file = %O;
    PRG0C:     start = $8000, size = $4000, fill = yes, file = %O;
    PRG0D:     start = $8000, size = $4000, fill = yes, file = %O;
    PRG0E:     start = $8000, size = $4000, fill = yes, file = %O;

    # Fixed 16KB PRG bank at $C000-$FFFF (bank $0F)
    PRG_FIXED: start = $C000, size = $4000, fill = yes, file = %O;
}

SEGMENTS {
    # iNES header
    HEADER:    load = HDR,       type = ro;

    # Switchable PRG banks
    BANK00:    load = PRG00,     type = ro;
    BANK01:    load = PRG01,     type = ro;
    BANK02:    load = PRG02,     type = ro;
    BANK03:    load = PRG03,     type = ro;
    BANK04:    load = PRG04,     type = ro;
    BANK05:    load = PRG05,     type = ro;
    BANK06:    load = PRG06,     type = ro;
    BANK07:    load = PRG07,     type = ro;
    BANK08:    load = PRG08,     type = ro;
    BANK09:    load = PRG09,     type = ro;
    BANK0A:    load = PRG0A,     type = ro;
    BANK0B:    load = PRG0B,     type = ro;
    BANK0C:    load = PRG0C,     type = ro;
    BANK0D:    load = PRG0D,     type = ro;
    BANK0E:    load = PRG0E,     type = ro;

    # Fixed bank ($C000-$FFFF)
    FIXED:     load = PRG_FIXED, type = ro;
}

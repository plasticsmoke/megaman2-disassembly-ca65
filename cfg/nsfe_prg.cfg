# =============================================================================
# NSFe PRG — Bank $0C (sound engine) + NSF shim
# Assembled at original CPU addresses for correct label resolution.
# Output is a flat binary: bank $0C ($8000-$BFFF) || shim ($C000-$CFFF).
# =============================================================================

MEMORY {
    PRG0C: start = $8000, size = $4000, fill = yes, file = %O;
    SHIM:  start = $C000, size = $1000, fill = yes, file = %O;
}

SEGMENTS {
    BANK0C:   load = PRG0C, type = ro;
    NSF_SHIM: load = SHIM,  type = ro;
}
